<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم إيقاف الموقع</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            text-align: center;
            background-color: #444;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #e74c3c;
        }

        p {
            font-size: 18px;
        }

        .social-buttons {
            margin-top: 20px;
        }

        .social-buttons a {
            text-decoration: none;
            margin: 0 10px;
        }

        .social-buttons img {
            width: 40px;
            height: 40px;
        }

        .theme-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }

        .theme-toggle img {
            width: 30px;
            height: 30px;
        }

        .light-mode {
            background-color: #f4f4f4;
            color: #333;
        }

        .light-mode .container {
            background-color: #fff;
            color: #333;
        }

        .light-mode h1 {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle">
        <img src="/img/moon.png" alt="تبديل الوضع">
    </button>
    <div class="container">
        <h1>تم إيقاف الموقع</h1>
        <p>نود أن نعلمكم أن الموقع قد تم إيقافه بسبب اعتزال اللعبة وبرمجة مواقع اللعبة.</p>
        <p>شكرًا لتفهمكم.</p>
        <div class="social-buttons">
            <a href="https://www.facebook.com/profile.php?id=61558933496823" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="شارك على فيسبوك">
            </a>
            <a href="https://api.whatsapp.com/send?phone=201098662418" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="شارك على واتساب">
            </a>
        </div>
    </div>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const darkModeClass = 'dark-mode';
        const lightModeClass = 'light-mode';

        // Check for saved theme in localStorage or use dark mode by default
        if (localStorage.getItem('theme') === darkModeClass) {
            document.body.classList.add(darkModeClass);
            themeToggle.querySelector('img').src = '/img/sun.png';
        } else {
            document.body.classList.add(lightModeClass);
            themeToggle.querySelector('img').src = '/img/moon.png';
        }

        themeToggle.addEventListener('click', () => {
            const isDarkMode = document.body.classList.contains(darkModeClass);

            if (isDarkMode) {
                document.body.classList.replace(darkModeClass, lightModeClass);
                themeToggle.querySelector('img').src = '/img/moon.png';
                localStorage.setItem('theme', lightModeClass);
            } else {
                document.body.classList.replace(lightModeClass, darkModeClass);
                themeToggle.querySelector('img').src = '/img/sun.png';
                localStorage.setItem('theme', darkModeClass);
            }
        });
    </script>
</body>
</html>
